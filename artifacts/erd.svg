<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 800" width="100%" height="100%" style="background-color: #0d1117; font-family: sans-serif;">
  <style>
    .table-box { fill: #161b22; stroke: #30363d; stroke-width: 2; }
    .table-header { fill: #1f6feb; font-weight: bold; fill-opacity: 0.1; stroke: #30363d; stroke-width: 1; }
    .table-title { font-size: 14px; fill: #58a6ff; font-weight: bold; }
    .field-text { font-size: 11px; fill: #c9d1d9; }
    .pk { fill: #ff7b72; font-weight: bold; }
    .fk { fill: #d2a8ff; font-weight: bold; }
    .relation-line { fill: none; stroke: #8b949e; stroke-width: 2; stroke-dasharray: 4,4; }
  </style>

  <!-- Title -->
  <text x="30" y="40" font-size="22" fill="#f0f6fc" font-weight="bold">Diagrama Entidade-Relacionamento (ERD) - Sistema CHAPADA</text>

  <!-- Table: profiles -->
  <g transform="translate(50, 80)">
    <rect width="180" height="180" rx="5" class="table-box" />
    <rect width="180" height="30" rx="5" class="table-header" />
    <text x="10" y="20" class="table-title">profiles</text>
    <text x="10" y="50" class="field-text pk">🔑 id : uuid (PK)</text>
    <text x="10" y="70" class="field-text">email : text</text>
    <text x="10" y="90" class="field-text">full_name : text</text>
    <text x="10" y="110" class="field-text">is_admin : boolean</text>
    <text x="10" y="130" class="field-text">role : text (default 'admin')</text>
    <text x="10" y="150" class="field-text">cargo : text</text>
    <text x="10" y="170" class="field-text">last_seen : timestamptz</text>
  </g>

  <!-- Table: projetos -->
  <g transform="translate(350, 80)">
    <rect width="220" height="230" rx="5" class="table-box" />
    <rect width="220" height="30" rx="5" class="table-header" />
    <text x="10" y="20" class="table-title">projetos</text>
    <text x="10" y="50" class="field-text pk">🔑 id : uuid (PK)</text>
    <text x="10" y="70" class="field-text">nome : text</text>
    <text x="10" y="90" class="field-text">contrato : text (UQ)</text>
    <text x="10" y="110" class="field-text">financiador : text</text>
    <text x="10" y="130" class="field-text">inicio : date</text>
    <text x="10" y="150" class="field-text">termino : date</text>
    <text x="10" y="170" class="field-text">valor : numeric</text>
    <text x="10" y="190" class="field-text">status : text</text>
    <text x="10" y="210" class="field-text fk">🔗 financiador_id : uuid (FK)</text>
  </g>

  <!-- Table: atividades -->
  <g transform="translate(680, 80)">
    <rect width="220" height="220" rx="5" class="table-box" />
    <rect width="220" height="30" rx="5" class="table-header" />
    <text x="10" y="20" class="table-title">atividades</text>
    <text x="10" y="50" class="field-text pk">🔑 id : uuid (PK)</text>
    <text x="10" y="70" class="field-text fk">🔗 projeto_id : uuid (FK)</text>
    <text x="10" y="90" class="field-text">data : date</text>
    <text x="10" y="110" class="field-text">tipo : text</text>
    <text x="10" y="130" class="field-text">descricao : text</text>
    <text x="10" y="150" class="field-text">local : text</text>
    <text x="10" y="170" class="field-text">municipio : text</text>
    <text x="10" y="190" class="field-text fk">🔗 municipio_id : uuid (FK)</text>
    <text x="10" y="210" class="field-text">responsaveis : text</text>
  </g>

  <!-- Table: beneficiarios -->
  <g transform="translate(350, 480)">
    <rect width="220" height="260" rx="5" class="table-box" />
    <rect width="220" height="30" rx="5" class="table-header" />
    <text x="10" y="20" class="table-title">beneficiarios</text>
    <text x="10" y="50" class="field-text pk">🔑 id : uuid (PK)</text>
    <text x="10" y="70" class="field-text">documento_identificador : text</text>
    <text x="10" y="90" class="field-text">nome_responsavel : text</text>
    <text x="10" y="110" class="field-text">quantidade_familiares : int</text>
    <text x="10" y="130" class="field-text">genero : text</text>
    <text x="10" y="150" class="field-text">faixa_etaria : text</text>
    <text x="10" y="170" class="field-text">quilombola : boolean</text>
    <text x="10" y="190" class="field-text">povo_originario : boolean</text>
    <text x="10" y="210" class="field-text fk">🔗 municipio_id : uuid (FK)</text>
    <text x="10" y="230" class="field-text fk">🔗 comunidade_id : uuid (FK)</text>
  </g>

  <!-- Table: atividade_beneficiarios -->
  <g transform="translate(680, 480)">
    <rect width="220" height="90" rx="5" class="table-box" />
    <rect width="220" height="30" rx="5" class="table-header" />
    <text x="10" y="20" class="table-title">atividade_beneficiarios</text>
    <text x="10" y="50" class="field-text pk">🔑🔗 atividade_id : uuid (PK, FK)</text>
    <text x="10" y="70" class="field-text pk">🔑🔗 beneficiario_id : uuid (PK, FK)</text>
  </g>

  <!-- Connections -->
  <!-- projetos.id -> atividades.projeto_id -->
  <path d="M 570 150 L 680 150" class="relation-line" />
  <circle cx="570" cy="150" r="3" fill="#8b949e" />
  <polygon points="680,150 670,145 670,155" fill="#8b949e" />

  <!-- atividades.id -> atividade_beneficiarios.atividade_id -->
  <path d="M 790 300 L 790 480" class="relation-line" />
  <circle cx="790" cy="300" r="3" fill="#8b949e" />
  <polygon points="790,480 785,470 795,470" fill="#8b949e" />

  <!-- beneficiarios.id -> atividade_beneficiarios.beneficiario_id -->
  <path d="M 570 610 L 680 535" class="relation-line" />
  <circle cx="570" cy="610" r="3" fill="#8b949e" />
  <polygon points="680,535 670,532 673,540" fill="#8b949e" />

  <!-- profiles.id -> auditoria.usuario_id -->
  <path d="M 140 260 L 140 480" class="relation-line" />

  <!-- Table: auditoria -->
  <g transform="translate(50, 480)">
    <rect width="180" height="160" rx="5" class="table-box" />
    <rect width="180" height="30" rx="5" class="table-header" />
    <text x="10" y="20" class="table-title">auditoria</text>
    <text x="10" y="50" class="field-text pk">🔑 id : uuid (PK)</text>
    <text x="10" y="70" class="field-text fk">🔗 usuario_id : uuid (FK)</text>
    <text x="10" y="90" class="field-text">acao : text</text>
    <text x="10" y="110" class="field-text">tabela : text</text>
    <text x="10" y="130" class="field-text">registro_id : text</text>
    <text x="10" y="150" class="field-text">detalhes : jsonb</text>
  </g>
</svg>
